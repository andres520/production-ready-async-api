services:
  api:
    command: >
      sh -c "rm -rf /tmp/prometheus/* &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${WEB_CONCURRENCY:-2}"
    restart: unless-stopped
    volumes:
      - app-data:/data
      - prometheus-multiproc:/tmp/prometheus
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO

  worker:
    command: celery -A app.celery_app.celery_app worker --loglevel=INFO --concurrency=${WORKER_CONCURRENCY:-4}
    restart: unless-stopped
    volumes:
      - app-data:/data
      - prometheus-multiproc:/tmp/prometheus
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO

  redis:
    restart: unless-stopped
    ports: []

  prometheus:
    restart: unless-stopped
    ports:
      - "9090:9090"

  grafana:
    restart: unless-stopped
    ports:
      - "3000:3000"
